# Rule pack for CodeShield local analyzer.
# Copy and pass as rules_config_path to override.

rules:
  potential_n_plus_one:
    enabled: true
    # severity: HIGH   # optional: HIGH | MEDIUM | LOW
  blocking_call:
    enabled: true
  performance_bottleneck:
    enabled: true
  memory_growth:
    enabled: true
  maintainability_risk:
    enabled: true
  silent_failure_risk:
    enabled: true
  missing_timeout:
    enabled: true
